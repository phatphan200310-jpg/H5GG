name: Build H5GG for iOS 18
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Install SDK 16.5
        run: |
          mkdir -p ~/theos/sdks
          # Tải SDK 16.5 trực tiếp để tránh lỗi giải nén
          curl -ksL "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz" -o ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz
          tar -xf ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz -C ~/theos/sdks
          rm ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make clean
          make FINALPACKAGE=1
        
      - name: Upload H5GG Dylib
        uses: actions/upload-artifact@v4
        with:
          name: H5GG_Ready_iOS18
          path: "./*.dylib"
